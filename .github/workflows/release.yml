name: release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: ""    }
          - { goos: darwin,  goarch: amd64, ext: ""    }
          - { goos: darwin,  goarch: arm64, ext: ""    }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X github.com/kamdynamics/kam-transfer/internal/version.Version=${GITHUB_REF_NAME}" \
            -o "dist/kam-transfer-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/kam-transfer
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
