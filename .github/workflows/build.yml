name: build

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # The default cross-compilable build is pure Go; the libmtp
      # backend is opt-in (see Makefile build-mtp). Run vet/test
      # without cgo so the runner doesn't need libmtp installed.
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go vet ./...
      - run: go test ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: ""    }
          - { goos: darwin,  goarch: amd64, ext: ""    }
          - { goos: darwin,  goarch: arm64, ext: ""    }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X github.com/kamdynamics/kam-transfer/internal/version.Version=${GITHUB_SHA::8}" \
            -o "dist/kam-transfer-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/kam-transfer
      - uses: actions/upload-artifact@v4
        with:
          name: kam-transfer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
